<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f8f5">
  <title>Multimodal Article Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="library-pane" aria-labelledby="appTitle">
      <header class="app-header">
        <div>
          <p class="eyebrow">Multimodal Article Viewer</p>
          <h1 id="appTitle">今日のヘッドライン</h1>
        </div>
        <div class="app-header-actions">
          <span id="articleCount" class="count-pill" aria-live="polite"></span>
          <button id="signOutButton" class="signout-button" type="button" hidden>サインアウト</button>
        </div>
      </header>

      <div class="toolbar" aria-label="記事検索とフィルター">
        <label class="search-field" for="searchInput">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="タイトル・ヘッドラインで検索">
        </label>
        <div class="segmented-control" role="tablist" aria-label="ソース種別">
          <button class="segment is-active" type="button" data-kind="all" aria-selected="true">すべて</button>
          <button class="segment" type="button" data-kind="web" aria-selected="false">Web</button>
          <button class="segment" type="button" data-kind="youtube" aria-selected="false">YouTube</button>
        </div>
      </div>

      <div id="articleList" class="article-list" aria-live="polite"></div>
    </section>

    <section id="workspacePane" class="workspace-pane" aria-labelledby="workspaceTitle">
      <div id="emptyWorkspace" class="empty-workspace">
        <p class="eyebrow">Detail</p>
        <h2 id="workspaceTitle">記事を選択</h2>
        <p>iPadではここに詳細やGoogle Slidesビューアを表示します。iPhoneでは詳細は下から開きます。</p>
      </div>

      <article id="detailPanel" class="detail-panel" hidden>
        <header class="detail-head">
          <div class="detail-heading">
            <button id="closeDetailButton" class="icon-button mobile-only" type="button" aria-label="詳細を閉じる">×</button>
            <div>
              <p id="detailMeta" class="detail-meta"></p>
              <h2 id="detailTitle"></h2>
            </div>
          </div>
          <label id="editModeControl" class="edit-mode-control" hidden>
            <span>編集</span>
            <input id="editModeToggle" type="checkbox" role="switch" aria-label="編集モード">
            <span class="edit-mode-track" aria-hidden="true"><span></span></span>
          </label>
        </header>
        <p id="detailHeadline" class="detail-headline"></p>
        <div id="detailActions" class="destination-grid"></div>
        <div id="detailOperationBackdrop" class="detail-operation-backdrop" hidden></div>
        <section id="detailOperationPanel" class="detail-operation-panel" aria-label="成果物URLの編集" hidden></section>
      </article>

      <section id="slidesViewer" class="slides-viewer" aria-label="Google Slides viewer" hidden>
        <header class="slides-head">
          <button id="backToDetailButton" class="viewer-pill" type="button">戻る</button>
          <div>
            <h2 id="slidesTitle"></h2>
            <p id="slideCounter"></p>
          </div>
          <div class="slides-head-actions">
            <button id="fullscreenButton" class="viewer-pill" type="button">全画面</button>
            <a id="openSlidesExternal" class="viewer-pill" target="_blank" rel="noopener">外部で開く</a>
          </div>
        </header>
        <div class="slides-layout">
          <div class="stage-wrap">
            <div class="slide-stage">
              <button id="prevSlideButton" class="nav-button nav-prev" type="button" aria-label="前のページ">‹</button>
              <div id="slideFrame" class="slide-frame"></div>
              <button id="nextSlideButton" class="nav-button nav-next" type="button" aria-label="次のページ">›</button>
            </div>
            <div id="thumbnailStrip" class="thumbnail-strip" aria-label="ページ一覧"></div>
          </div>
          <aside class="speaker-notes" aria-label="Speaker notes">
            <h3>Speaker Notes</h3>
            <p id="speakerNoteContent"></p>
          </aside>
        </div>
      </section>
    </section>
  </main>

  <div id="sheetBackdrop" class="sheet-backdrop" hidden></div>
  <div id="saveStatus" class="save-status" role="status" aria-live="polite" hidden></div>

  <div id="authGate" class="auth-gate" hidden>
    <form id="loginForm" class="auth-card" autocomplete="on">
      <p class="eyebrow">Multimodal Article Viewer</p>
      <h2>サインイン</h2>
      <p class="auth-sub">登録された閲覧者のみアクセスできます。</p>
      <label class="auth-label" for="loginEmail">メールアドレス
        <input id="loginEmail" type="email" autocomplete="username" required>
      </label>
      <label class="auth-label" for="loginPassword">パスワード
        <input id="loginPassword" type="password" autocomplete="current-password" required>
      </label>
      <button id="loginButton" class="auth-submit" type="submit">ログイン</button>
      <p id="authError" class="auth-error" role="alert" hidden></p>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
